# v10.5.0: Dependabot configuration.
#
# Автоматически создаёт PR для обновления зависимостей и GitHub Actions.
# Помогает поддерживать проект в актуальном состоянии без ручной работы.
#
# v10.5.2: `groups` с `dependency-type: "production"` (валидное значение в
# Dependabot schema) — все production minor/patch updates в ОДИН PR в неделю.
# Это устраняет 2-3 параллельных Dependabot PR (v10.5.0 и v10.5.1 были
# выпущены 2 раза подряд из-за того, что v10.5.0 забыл про groups).
# development-deps — отдельный PR (обычно test/build tools).

version: 2

# Cargo dependencies: еженедельно, с groups.
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    groups:
      # production-deps: все minor/patch updates runtime deps в ОДИН PR.
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # development-deps: minor/patch updates test/build deps в ОДИН PR.
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major updates — отдельные PR (могут ломать API).
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"

  # GitHub Actions: еженедельно, все updates в ОДИН PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Europe/Moscow"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
