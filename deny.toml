# v10.5.0: cargo-deny configuration.
#
# Проверяет:
# - advisories: уязвимости в зависимостях (RUSTSEC advisory database)
# - bans: запрещённые crates (например, outdated/unsafe)
# - sources: только trusted registries (crates.io)
# - licenses: только разрешённые лицензии (MIT/Apache-2.0/BSD)
#
# Запуск: cargo deny check (локально), `embarkstudios/cargo-deny` action (в CI).
# Документация: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
# v10.7.1: number_prefix (RUSTSEC-2025-0119) — transitive от indicatif 0.17.
# Не наш выбор (indicatif зависит). TODO: перенести indicatif в отдельный
# workspace или ждать обновления indicatif. Игнорируем пока.
ignore = ["RUSTSEC-2025-0119"]
yanked = "warn"

[bans]
# Запрещаем crates с known security issues или дублирующие функциональность.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[licenses]
allow = [
    "MIT",
    "MIT-0",                   # v10.7.1: borrow-or-share (через jsonschema 0.47 transitive)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",                 # ring использует MPL-2.0 (нормально для крипто)
    "CDLA-Permissive-2.0",    # webpki-roots v0.26/v1.0 (Mozilla CA bundle)
]
confidence-threshold = 0.8

