# PR-17d (v10.7.19): PGO (Profile-Guided Optimization) build для release tags.
#
# Только для `v*.*.*` tags (release builds). PR-овые CI runs используют
# обычный release profile без PGO (для скорости CI).
#
# Улучшение: ~5% throughput на hot-path bench (1.74 µs → 1.65 µs/msg).
# Полная процедура — см. docs/PERFORMANCE.md §6.
#
# v10.7.19 step 6 (PR-Q series #76):
# Используем rustc 1.95 (MSRV) для PGO build вместо rustc 1.97/stable или
# nightly. rustc 1.95 генерирует LLVM raw profile format v8, который совместим
# с apt-installed `llvm-17` (raw format v8). Это избегает 1.9 GB LLVM tarball
# download (PR #75) и nightly toolchain overhead.
#
# Преимущества:
# - Production binary собирается на MSRV 1.95 (минимальная совместимая версия,
#   зафиксировано в rust-toolchain.toml → enforced rustc).
# - Проект использует только stable API (cargo-rustc 1.79+) → совместимо с 1.95.
# - apt `llvm-17` (≈30 MB) единственная зависимость, доступна на ubuntu-22.04/24.04.

name: Release PGO build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag для PGO-сборки (например, v10.7.20)'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  pgo-build:
    name: PGO build (Linux amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pgo-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.95 toolchain (MSRV — matches llvm-17 raw format v8)
        uses: dtolnay/rust-toolchain@1.95
        with:
          # v10.7.19 step 6 (PR-Q series #76):
          # Установил причину PR-Q series: rustc 1.97 (stable) генерирует raw
          # profile format v10 (LLVM 19+), apt имеет только llvm-{16,17,18}
          # (formats v8/v9/v9) — none совместимы. Rustc nightly 1.99 (format
          # v10/11) тоже НЕ совместим с apt llvm-{16,17,18}.
          #
          # **Final solution: использовать rustc 1.95 (MSRV)** — raw format v8.
          # apt-installed `llvm-17` имеет raw format v8 → MATCH! Production
          # binary собирается на 1.95 (MSRV policy enforced через
          # rust-toolchain.toml в репо). Production code использует только
          # stable API (no nightly-only), совместимо с 1.95.
          #
          # Никакого download tarball 1.9 GB не нужно. apt `llvm-17` (≈30 MB)
          # — единственная зависимость.
          components: rustfmt, clippy

      - name: Install llvm-profdata (apt)
        if: always()
        run: |
          # На ubuntu-22.04/24.04 устанавливаем llvm-17 (raw format v8,
          # совместим с rustc 1.95 MSRV). apt default `llvm` = llvm-18 (raw
          # format v9) — НЕ совместим с rustc 1.95 (v8).
          sudo apt-get update -qq 2>&1 | tail -3 || true
          sudo apt-get install -y --no-install-recommends llvm-17 2>&1 | tail -3 || true
          echo "=== llvm-profdata location after install ==="
          which llvm-profdata || true
          ls -la /usr/bin/llvm-profdata 2>&1 || true
          ls -la /usr/lib/llvm-*/bin/llvm-profdata 2>&1 || true

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-pgo
          cache-on-failure: true

      - name: PGO step 1/3 — build with profile-generate
        env:
          # Используем rustc 1.95 (MSRV) для совместимости с llvm-17.
          RUSTUP_TOOLCHAIN: 1.95
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          mkdir -p "$PGO_DIR"
          # -Cprofile-generate= записывает .profraw файлы в $PGO_DIR при запуске бинаря.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            cargo build --release --bench hot_path

      - name: PGO step 2/3 — run representative workload (bench)
        env:
          RUSTUP_TOOLCHAIN: 1.95
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Прогон benches для сбора representative profile данных.
          # Criterion binary сам по себе нагружает hot-path достаточно для профиля.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            ./target/release/deps/hot_path-* --bench --quick

      - name: PGO step 3/3 — merge profdata + final build
        env:
          RUSTUP_TOOLCHAIN: 1.95
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Resolve llvm-profdata — apt-installed llvm-17 (format v8) совместим
          # с rustc 1.95 MSRV. Tier 1: prefer versioned path.
          LLVM_PROFDATA=""

          # Tier 1: /usr/lib/llvm-17/bin/llvm-profdata (versioned path).
          if [ -x "/usr/lib/llvm-17/bin/llvm-profdata" ]; then
            LLVM_PROFDATA="/usr/lib/llvm-17/bin/llvm-profdata"
          fi

          # Tier 2: /usr/bin/llvm-profdata (apt default symlink).
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            LLVM_PROFDATA="$(which llvm-profdata 2>/dev/null || true)"
          fi

          # Tier 3: generic /usr/lib/llvm-*/bin/llvm-profdata.
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            LLVM_PROFDATA="$(ls -d /usr/lib/llvm-*/bin/llvm-profdata 2>/dev/null | head -1 || true)"
          fi

          # Tier 4: rustup which (fallback).
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            LLVM_PROFDATA="$(rustup which llvm-profdata 2>/dev/null || true)"
          fi

          if [ ! -x "$LLVM_PROFDATA" ]; then
            echo "::error::llvm-profdata binary not found. Tried: llvm-17 / which / /usr/lib/llvm-*/bin / rustup which."
            exit 1
          fi
          echo "Using llvm-profdata: $LLVM_PROFDATA"
          "$LLVM_PROFDATA" --version

          # Merge .profraw → merged.profdata
          echo "::group::Merging $(ls "$PGO_DIR"/*.profraw 2>/dev/null | wc -l | tr -d ' ') profraw files"
          ls "$PGO_DIR"/*.profraw 2>/dev/null | head -5
          "$LLVM_PROFDATA" merge -o "$PGO_DIR/merged.profdata" "$PGO_DIR"/*.profraw
          ls -la "$PGO_DIR/merged.profdata"
          echo "::endgroup::"

          # Final build with profile-use
          echo "::group::Building optimized binary with merged.profdata"
          RUSTFLAGS="-Cprofile-use=$PGO_DIR/merged.profdata" \
            cargo build --release
          echo "::endgroup::"

      - name: Verify PGO improvement (sanity bench)
        run: |
          echo "::group::PGO verification — bench should show ~1.65 µs/msg (vs ~1.74 без PGO)"
          ./target/release/deps/hot_path-* --bench --quick 2>&1 \
            | grep -E "rfc5424_with_faker|thrpt" \
            | head -5
          echo "::endgroup::"

      - name: Upload PGO-optimized binary
        uses: actions/upload-artifact@v4
        with:
          name: syslog-generator-pgo-${{ github.ref_name }}
          path: |
            target/release/syslog-generator
            pgo/merged.profdata
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## PGO build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Profile files: $(ls ${{ github.workspace }}/pgo/*.profraw 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Merged profdata: $(ls -la ${{ github.workspace }}/pgo/merged.profdata 2>/dev/null | awk '{print $5}') bytes" >> $GITHUB_STEP_SUMMARY
          echo "- See docs/PERFORMANCE.md §6 for details" >> $GITHUB_STEP_SUMMARY
