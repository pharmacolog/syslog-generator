# codecov.yml — codecov.io configuration.
#
# Используется codecov-action/codecov-benchmark-action для upload coverage.
# URL: https://codecov.io/gh/pharmacolog/syslog-generator
# Badge в README: codecov/c/github/pharmacolog/syslog-generator
#
# PR-9: coverage badge (через codecov.io). Альтернатива — shields.io endpoint
# с codecov API, но codecov-action проще и нативнее.

codecov:
  # PR-11 (v10.7.12): coverage gate.
  # Текущее baseline (v10.7.11): 87.94% lines.
  # Target: 87% project (с allow list для TLS/Kafka/main.rs).
  # Patch target: 80% (новый код в PR должен быть покрыт).
  status:
    project:
      default:
        target: 87%
        threshold: 1%   # PR не должен уменьшать coverage более чем на 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 80%   # новый код в PR должен быть покрыт
        threshold: 5%

  # Notify в PR через GitHub Status API.
  notify:
    after_n_builds: 2  # ubuntu + kafka
    wait_for_ci: true

# Что НЕ покрывать (CI-артефакты, examples).
ignore:
  - "examples/**"
  - "benches/**"
  - "fuzz/**"
  - "tests/**"
  - "**/tests.rs"
  # PR-11: исключаем модули которые сложно покрыть unit-тестами.
  # - src/main.rs: CLI entrypoint (tested via integration tests)
  # - src/payload_proptests.rs: тест-only файл
  # - src/transport/tls.rs: TLS handshake требует реальных сертификатов
  #   (покрыт integration tests в tests/integration_tests.rs)
  # - src/transport/kafka.rs: feature-gated, требует Kafka broker
  # - src/transport/file.rs RotationConfig branches, частично покрыты
  - "src/main.rs"
  - "src/payload_proptests.rs"

# Flags — для аннотаций в PR.
flags:
  unit:
    paths:
      - src/
    carryforward: true
  integration:
    paths:
      - src/
      - tests/
    carryforward: true

# Комментарии в PR.
comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: true   # не комментировать если нет изменений
  require_base: false      # сравнивать с base branch
  require_head: true       # сравнивать с HEAD