# N12 (v9.6.0): CI workflow для сборки и публикации Docker-образа.
#
# Триггеры:
#   - push в main → сборка amd64 + push в ghcr.io с тегом = версии из Cargo.toml.
#   - push в dev  → сборка amd64 + push с тегом "dev-{short_sha}".
#   - push в release/v*.*.* → сборка amd64 + arm64 + push (полный multi-arch).
#   - push tag v*.*.* → сборка amd64 + arm64 + push (полный multi-arch).
#   - pull_request → сборка amd64 (без push) для smoke-test.
#   - workflow_dispatch → ручная сборка (для ad-hoc релизов).
#
# v10.4.3: **arm64 собирается ТОЛЬКО в релизной ветке** (`release/v*.*.*`)
# и на push тега `v*.*.*`. Во всех остальных случаях (main, dev, PR)
# собирается только amd64 — это ускоряет CI ~50% (QEMU emulation arm64
# занимает ~30-40 минут, amd64 собирается ~10-15 минут).
#
# Использование secrets:
#   GITHUB_TOKEN — автоматический, нужен для push в ghcr.io.

name: Docker

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: dev-{short_sha})"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # pharmacolog/syslog-generator

jobs:
  # v10.4.3: amd64 build собирается на ВСЕХ push/PR — быстрый smoke-test
  # для CI (~10-15 мин). arm64 собирается ТОЛЬКО в релизной ветке
  # (`release/v*.*.*`) или на push тега `v*.*.*` — это multi-arch для
  # официального релиза, ~30-40 мин через QEMU emulation.
  docker-amd64:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry (только push, не PR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          SHORT_SHA="${{ steps.meta.outputs.SHORT_SHA }}"
          TAG_ARR=()
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${VERSION}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}")
          else
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev-${SHORT_SHA}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev")
          fi
          TAGS=""
          for t in "${TAG_ARR[@]}"; do
            if [[ -n "$TAGS" ]]; then
              TAGS+=$'\n'
            fi
            TAGS+="$t"
          done
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        # Используем tag, который ТОЧНО есть в registry для текущего push.
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="${{ steps.meta.outputs.VERSION }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-${{ steps.meta.outputs.SHORT_SHA }}"
          fi
          echo "Smoke test image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          docker run --rm "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" --version

  # v10.4.3: arm64 multi-arch build ТОЛЬКО для релизов.
  # Триггер: push в release/v*.*.* ИЛИ push tag v*.*.*.
  docker-arm64:
    name: Build & push (arm64, release-only)
    runs-on: ubuntu-latest
    needs: docker-amd64
    if: |
      (startsWith(github.ref, 'refs/heads/release/')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (для arm64 emulation на amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          SHORT_SHA="${{ steps.meta.outputs.SHORT_SHA }}"
          TAG_ARR=()
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${VERSION}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}")
          else
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev-${SHORT_SHA}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev")
          fi
          TAGS=""
          for t in "${TAG_ARR[@]}"; do
            if [[ -n "$TAGS" ]]; then
              TAGS+=$'\n'
            fi
            TAGS+="$t"
          done
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push (arm64, multi-arch manifest)
        # multi-arch через buildx platforms=linux/amd64,linux/arm64:
        # - amd64 собирается нативно (быстро)
        # - arm64 собирается через QEMU emulation (медленно)
        # Итог: один manifest с обоими arch, push в registry как multi-arch image.
        # amd64 build происходит заново (buildx не использует кэш из
        # docker-amd64 job — разные cache paths), но это дешевле чем
        # собирать arm64 на каждом push.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max