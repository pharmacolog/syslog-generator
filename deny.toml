# v10.5.0: cargo-deny configuration.
#
# Проверяет:
# - advisories: уязвимости в зависимостях (RUSTSEC advisory database)
# - bans: запрещённые crates (например, outdated/unsafe)
# - sources: только trusted registries (crates.io)
# - licenses: только разрешённые лицензии (MIT/Apache-2.0/BSD)
#
# Запуск: cargo deny check (локально), `embarkstudios/cargo-deny` action (в CI).
# Документация: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[bans]
# Запрещаем crates с known security issues или дублирующие функциональность.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",                 # ring использует MPL-2.0 (нормально для крипто)
    "CDLA-Permissive-2.0",    # webpki-roots v0.26/v1.0 (Mozilla CA bundle)
]
confidence-threshold = 0.8

[advisories]
# RUSTSEC-2024-0437: protobuf 2.28.0 (transitive от prometheus 0.13).
# Невозможно обновить без major-bump prometheus, что выходит за рамки
# v10.5.0. TODO: обновить prometheus (>= 0.14 с protobuf 3.x) в v10.8.0.
ignore = ["RUSTSEC-2024-0437"]
yanked = "warn"
