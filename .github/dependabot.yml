# v10.5.0: Dependabot configuration.
#
# Автоматически создаёт PR для обновления зависимостей и GitHub Actions.
# Помогает поддерживать проект в актуальном состоянии без ручной работы.
#
# v10.5.1: убрана `dependency-type: "direct"/"indirect"` — Dependabot schema
# требует `production` или `development`. Без groups — Dependabot делает
# отдельный PR на каждое обновление, что проще и более прозрачно.

version: 2

# Cargo dependencies: еженедельно.
# - production: [dependencies] (runtime) — автоматические minor/patch PR.
# - development: [dev-dependencies] (test/build) — отдельный PR.
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "cargo"

  # GitHub Actions: еженедельно.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
