# PR-17d (v10.7.19): PGO (Profile-Guided Optimization) build для release tags.
#
# Только для `v*.*.*` tags (release builds). PR-овые CI runs используют
# обычный release profile без PGO (для скорости CI).
#
# Улучшение: ~5% throughput на hot-path bench (1.74 µs → 1.65 µs/msg).
# Полная процедура — см. docs/PERFORMANCE.md §6.
#
# v10.7.19 step 7 (PR-Q series #77):
# Использовать latest stable rustc (which builds production binary) + download
# LLVM 20 tarball (~1.9 GB) с GitHub release. LLVM 20 (raw format v11)
# совместимо с rustc 1.97 (raw format v10).
#
# Преимущества перед PR #75 (tarball-only):
# - Правильный URL: `LLVM-20.1.0-Linux-X64.tar.xz` (НЕ clang+llvm-...tar.xz
#   которая для Windows).
# - Production binary собирается на latest stable (1.97) — пользователи получают
#   все последние performance improvements, bug fixes.
# - rustc 1.95 → LLVM 22 (format v10); apt имеет only до llvm-18 (format v9) — mismatch.

name: Release PGO build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag для PGO-сборки (например, v10.7.20)'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  pgo-build:
    name: PGO build (Linux amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: pgo-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Latest stable rustc (1.97 на момент 22.07.2026) — используется
          # для production binary build. Generates .profraw в raw format v10.
          components: rustfmt, clippy

      - name: Cache LLVM tarball
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /tmp/LLVM-20.1.0-Linux-X64.tar.xz
          key: llvm-20.1.0-${{ runner.os }}-pgo-v1
          restore-keys: |
            llvm-20.1.0-${{ runner.os }}-pgo-

      - name: Download matching llvm-profdata tarball
        env:
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          set -euo pipefail
          LLVM_VER=20.1.0
          LLVM_TARBALL="LLVM-${LLVM_VER}-Linux-X64.tar.xz"
          LLVM_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/${LLVM_TARBALL}"
          LLVM_PATH="/tmp/${LLVM_TARBALL}"
          start=$SECONDS
          if [ -f "$LLVM_PATH" ]; then
            LLVM_SOURCE=cache
            LLVM_DOWNLOAD_SECONDS=0
          else
            echo "Downloading $LLVM_URL (~1.9 GB)..."
            curl -fSL --connect-timeout 30 --max-time 1200 "$LLVM_URL" -o "$LLVM_PATH"
            LLVM_SOURCE=fresh
            LLVM_DOWNLOAD_SECONDS=$((SECONDS - start))
          fi
          mkdir -p /tmp/llvm-bin
          tar -xJf "$LLVM_PATH" -C /tmp/llvm-bin --strip-components=1
          test -x /tmp/llvm-bin/bin/llvm-profdata
          LLVM_VERSION=$(/tmp/llvm-bin/bin/llvm-profdata --version)
          case "$LLVM_VERSION" in
            *"LLVM version ${LLVM_VER}"*) ;;
            *) echo "::error::Unexpected llvm-profdata version: $LLVM_VERSION"; exit 1 ;;
          esac
          LLVM_RUSTC_VERSION=$(rustc --version)
          {
            echo "LLVM_BIN=/tmp/llvm-bin/bin"
            echo "LLVM_SOURCE=$LLVM_SOURCE"
            echo "LLVM_DOWNLOAD_SECONDS=$LLVM_DOWNLOAD_SECONDS"
            echo "LLVM_RUSTC_VERSION=$LLVM_RUSTC_VERSION"
          } >> "$GITHUB_ENV"
          echo "$LLVM_VERSION"
          ls -la /tmp/llvm-bin/bin/llvm-profdata

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-pgo
          cache-on-failure: true

      - name: PGO step 1/3 — build with profile-generate
        env:
          # Используем stable toolchain (установлен выше) для consistent LLVM version.
          RUSTUP_TOOLCHAIN: stable
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          mkdir -p "$PGO_DIR"
          # -Cprofile-generate= записывает .profraw файлы в $PGO_DIR при запуске бинаря.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            cargo build --release --bench hot_path

      - name: PGO step 2/3 — run representative workload (bench)
        env:
          RUSTUP_TOOLCHAIN: stable
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Прогон benches для сбора representative profile данных.
          # Используем `cargo bench --bench hot_path` (а не прямой вызов
          # ./hot_path-* binary) — criterion требует explicit bench name,
          # иначе fail "no benchmark specified". `.profraw` файлы записываются
          # в $PGO_DIR при запуске бинаря.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            cargo bench --bench hot_path -- --quick

      - name: PGO step 3/3 — merge profdata + final build
        env:
          RUSTUP_TOOLCHAIN: stable
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Resolve llvm-profdata:
          # 1. `/tmp/llvm-bin/bin/llvm-profdata` (downloaded LLVM 20 tarball,
          #    matching stable rustc 1.97 raw format v10) — **PRIMARY**
          # 2. `/usr/lib/llvm-{18,17,16}/bin/llvm-profdata` (apt-installed,
          #    НЕ совместим с rustc 1.97 формат v10 — fallback only для MSRV)
          # 3. `which llvm-profdata` (apt default symlink, possible format mismatch)
          # 4. generic /usr/lib/llvm-*/bin/llvm-profdata
          LLVM_PROFDATA=""

          # Tier 1: downloaded LLVM 20 (matching stable).
          if [ -x "${LLVM_BIN:-/nonexistent}/llvm-profdata" ]; then
            LLVM_PROFDATA="${LLVM_BIN}/llvm-profdata"
          fi

          # Tier 2: apt-installed llvm-{18,17,16}.
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            for v in 18 17 16; do
              if [ -x "/usr/lib/llvm-${v}/bin/llvm-profdata" ]; then
                LLVM_PROFDATA="/usr/lib/llvm-${v}/bin/llvm-profdata"
                break
              fi
            done
          fi

          # Tier 3: /usr/bin/llvm-profdata (apt default symlink).
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            LLVM_PROFDATA="$(which llvm-profdata 2>/dev/null || true)"
          fi

          # Tier 4: generic versioned path.
          if [ -z "$LLVM_PROFDATA" ] || [ ! -x "$LLVM_PROFDATA" ]; then
            LLVM_PROFDATA="$(find /usr/lib -path '/usr/lib/llvm-*/bin/llvm-profdata' -type f -print -quit 2>/dev/null || true)"
          fi

          if [ ! -x "$LLVM_PROFDATA" ]; then
            echo "::error::llvm-profdata binary not found. Tried: /tmp/llvm-bin (downloaded) / llvm-{18,17,16} / which / /usr/lib/llvm-*/bin."
            exit 1
          fi
          echo "Using llvm-profdata: $LLVM_PROFDATA"
          "$LLVM_PROFDATA" --version

          # Merge .profraw → merged.profdata
          PROFRAW_COUNT=$(find "$PGO_DIR" -maxdepth 1 -type f -name '*.profraw' -print | wc -l | tr -d ' ')
          echo "::group::Merging $PROFRAW_COUNT profraw files"
          find "$PGO_DIR" -maxdepth 1 -type f -name '*.profraw' -print | head -5
          "$LLVM_PROFDATA" merge -o "$PGO_DIR/merged.profdata" "$PGO_DIR"/*.profraw
          find "$PGO_DIR" -maxdepth 1 -type f -name 'merged.profdata' -ls
          echo "::endgroup::"

          # Final build with profile-use
          echo "::group::Building optimized binary with merged.profdata"
          RUSTFLAGS="-Cprofile-use=$PGO_DIR/merged.profdata" \
            cargo build --release
          echo "::endgroup::"

      - name: Verify PGO improvement (sanity bench)
        env:
          RUSTUP_TOOLCHAIN: stable
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          echo "::group::PGO verification — bench should show ~1.65 µs/msg (vs ~1.74 без PGO)"
          # Используем уже собранный с `-Cprofile-use=$PGO_DIR/merged.profdata`
          # binary из step 3/3. cargo bench найдет binary в target/release/deps/.
          # Если bench binary не пересобран с PGO profile — sanity check покажет
          # ~1.74 µs/msg (то же что без PGO).
          cargo bench --bench hot_path -- --quick 2>&1 \
            | grep -E "rfc5424_with_faker|thrpt" \
            | head -5
          echo "::endgroup::"

      - name: Upload PGO-optimized binary
        uses: actions/upload-artifact@v4
        with:
          name: syslog-generator-pgo-${{ github.ref_name }}
          path: |
            target/release/syslog-generator
            pgo/merged.profdata
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          PROFRAW_COUNT=$(find "${{ github.workspace }}/pgo" -maxdepth 1 -type f -name '*.profraw' -print | wc -l | tr -d ' ')
          MERGED_SIZE=$(stat -c '%s' "${{ github.workspace }}/pgo/merged.profdata" 2>/dev/null || printf 'n/a')
          {
            echo "## PGO build summary"
            echo "- Tag: ${{ github.ref_name }}"
            echo "- LLVM source: ${LLVM_SOURCE:-unknown}"
            echo "- LLVM download: ${LLVM_DOWNLOAD_SECONDS:-unknown}s"
            echo "- Rust toolchain: ${LLVM_RUSTC_VERSION:-unknown}"
            echo "- Profile files: $PROFRAW_COUNT"
            echo "- Merged profdata: ${MERGED_SIZE} bytes"
            echo "- See docs/PERFORMANCE.md §6 for details"
          } >> "$GITHUB_STEP_SUMMARY"
