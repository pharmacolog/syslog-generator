# N12 (v9.6.0): CI workflow для сборки и публикации Docker-образа.
#
# Триггеры:
#   - push в main → сборка amd64 + push в ghcr.io с тегом = версии из Cargo.toml.
#   - push в dev  → сборка amd64 + push с тегом "dev-{short_sha}".
#   - push в release/v*.*.* → сборка amd64 + arm64 + push (полный multi-arch).
#   - push tag v*.*.* → сборка amd64 + arm64 + push (полный multi-arch).
#   - pull_request → сборка amd64 (без push) для smoke-test.
#   - workflow_dispatch → ручная сборка (для ad-hoc релизов).
#
# v10.4.3: **arm64 собирается ТОЛЬКО в релизной ветке** (`release/v*.*.*`)
# и на push тега `v*.*.*`. Во всех остальных случаях (main, dev, PR)
# собирается только amd64 — это ускоряет CI ~50% (QEMU emulation arm64
# занимает ~30-40 минут, amd64 собирается ~10-15 минут).
#
# Использование secrets:
#   GITHUB_TOKEN — автоматический, нужен для push в ghcr.io.

name: Docker

on:
  push:
    branches:
      - main
      - dev
      # v10.4.3: триггерим Docker на release-ветках для arm64 multi-arch build.
      - "release/v*.*.*"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: dev-{short_sha})"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # pharmacolog/syslog-generator

jobs:
  # v10.4.4 (фикс): ДВА job'а с conditional `if:` чтобы избежать race condition.
  #
  # `docker-amd64`: запускается на non-release push (main, dev, feature/*, PR).
  # SKIP на release — `docker-multiarch` сделает multi-arch manifest.
  #
  # `docker-multiarch`: запускается ТОЛЬКО на release (push в release/v*.*.*
  # или push tag v*.*.*). Собирает multi-arch manifest через buildx
  # platforms=linux/amd64,linux/arm64 (QEMU emulation arm64).
  #
  # Так гарантируется ОДИН multi-arch manifest в registry на release, а не
  # race condition между двумя job'ами.
  docker-amd64:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    # Skip на release — docker-multiarch сделает multi-arch.
    if: |
      !(startsWith(github.ref, 'refs/heads/release/')) &&
      !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry (только push, не PR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          SHORT_SHA="${{ steps.meta.outputs.SHORT_SHA }}"
          TAG_ARR=()
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${VERSION}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}")
          else
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev-${SHORT_SHA}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev")
          fi
          TAGS=""
          for t in "${TAG_ARR[@]}"; do
            if [[ -n "$TAGS" ]]; then
              TAGS+=$'\n'
            fi
            TAGS+="$t"
          done
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="${{ steps.meta.outputs.VERSION }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-${{ steps.meta.outputs.SHORT_SHA }}"
          fi
          echo "Smoke test image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          docker run --rm "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" --version

  # v10.4.4: multi-arch build ТОЛЬКО для релизов.
  # Собирает ОДИН manifest с amd64+arm64 через buildx.
  docker-multiarch:
    name: Build & push (multi-arch, release-only)
    runs-on: ubuntu-latest
    if: |
      (startsWith(github.ref, 'refs/heads/release/')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (для arm64 emulation на amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          SHORT_SHA="${{ steps.meta.outputs.SHORT_SHA }}"
          TAG_ARR=()
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${VERSION}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}")
          else
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev-${SHORT_SHA}")
            TAG_ARR+=("${REGISTRY}/${IMAGE_NAME}:dev")
          fi
          TAGS=""
          for t in "${TAG_ARR[@]}"; do
            if [[ -n "$TAGS" ]]; then
              TAGS+=$'\n'
            fi
            TAGS+="$t"
          done
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push (multi-arch manifest)
        # matrix.platform = linux/amd64 (нативно) + linux/arm64 (через QEMU emulation).
        # buildx создаёт ОДИН manifest с обоими arch под каждым тегом.
        # amd64 build дешёвый (нативный), arm64 — дорогой (QEMU ~30-40 мин).
        # Но это выполняется ТОЛЬКО на release (защита if: выше), не на
        # каждом push в main/dev.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max