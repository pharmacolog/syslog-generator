# GitHub Actions: CI-пайплайн (N9, веха D).
#
# Цель: регрессионный гейт для каждого push в main/dev и каждого PR в main.
# Включает все стадии из CLAUDE_HANDOFF.md §2 (Rust 1.97 stable, формат,
# clippy, build, test, bench-компиляция), адаптированные под GitHub Actions
# (полный `cargo test` тут не таймаутит — для этого есть 6 часов на job).
#
# Матрица: ubuntu-latest + macos-latest. Это покрывает два разных бэкенда
# native-tls (openssl-sys на Linux, Security.framework на macOS), что важно
# для безопасного TLS по умолчанию (N4) и для тестов с openssl_self_signed.

name: CI

on:
  push:
    branches: [main, dev, "release/v*"]
  pull_request:
    branches: [main]

# v10.7.1: явные permissions на уровне workflow (Code Scanning
# actions/missing-workflow-permissions). Принцип least privilege.
# Глобальные permissions: только contents: read для checkout.
permissions:
  contents: read

# PR-7 fix: macos-latest runners в GH Actions периодически зависают
# (видимо infrastructure issue) на 30+ минут без логов. Добавляем
# timeout 20 минут на все jobs. При timeout job падает, но мы делаем
# macos continue-on-error, чтобы он не блокировал release — у нас уже
# есть полное покрытие на ubuntu + kafka.
env:
  CARGO_TERM_COLOR: always
  # -Dwarnings: предупреждения Rust == ошибки CI (для lib + bins).
  # Покрывает warnings от rustc и от clippy, не подменяет clippy::-lints.
  RUSTFLAGS: -Dwarnings
  # macos timeout — 20 минут (нормальный прогон ~5-7 мин).
  GH_MACOS_TIMEOUT_MIN: 20

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      # На macOS отказы TLS-тестов исторически воспроизводились реже,
      # чем на Linux; пускаем обе платформы параллельно и суммируем.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    # PR-7: timeout 20 мин на job — GH Actions macos runners иногда
    # зависают на 30+ мин без логов. continue-on-error: true делает macos
    # non-blocking (warning, не failure) — у нас уже есть полное покрытие
    # на ubuntu + kafka jobs.
    timeout-minutes: ${{ env.GH_MACOS_TIMEOUT_MIN }}
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    env:
      # F16 (v9.3.0): без feature `kafka` — базовый набор (file/tcp/udp/tls).
      # Kafka-ветка тестируется отдельным job `test-kafka`.
      SKIP_KAFKA_EXAMPLE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Компоненты по умолчанию: rustc, cargo, rust-std.
          # rustfmt нужен для `cargo fmt --check`, clippy — для `cargo clippy`.
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # workspaces: syslog-generator (workspace root = syslog-generator).
          # cache-on-failure: true — сохраняет кэш даже если job упал,
          # чтобы следующий push мог переиспользовать слой.
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo

      - name: Install OpenSSL dev headers (Linux only)
        if: runner.os == 'Linux'
        # native-tls на Linux линкуется с libssl через openssl-sys; без
        # dev-заголовков сборка упадёт. На macOS используется Security.framework,
        # поэтому apt-get там не нужен.
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release
        run: cargo build --release --locked

      - name: Compile tests
        # `cargo test --no-run` — компиляция тестовых бинарников без запуска;
        # полезно отдельно от шага "Run tests" чтобы быстрее получить ошибку
        # компиляции, если она есть.
        run: cargo test --no-run --locked

      - name: Run tests
        # Полный прогон — в GitHub Actions нет таймаута sandbox из
        # CLAUDE_HANDOFF.md §2. Тесты используют уникальные порты
        # (127.0.0.1:0), параллельность не приводит к конфликтам.
        # PR-2: --features test-helpers для доступа к ensure_rustls_provider_for_tests.
        run: cargo test --locked --features test-helpers

      - name: Compile benches (Criterion)
        # Только компиляция — запуск бенчей в CI не имеет смысла
        # (результаты зависят от железа runner'а и не сравнимы).
        run: cargo bench --no-run --locked

      - name: Bench quick (monitoring, non-blocking)
        # v10.1.0: запуск benches на каждом PR для мониторинга производительности.
        # НЕ блокирующий — ревьюер смотрит результаты и принимает решение.
        # Полноценный bench-regression gate с persistent baseline запланирован
        # в v10.5.0 (CI расширение — cargo-benchcmp или c5h/bench-regression-action).
        # Допуск по контракту v9.6.0 §11: ±10% relative throughput.
        #
        # v10.7.1: явное `--bench <name>` — `cargo bench` без `--bench`
        # запускает lib unit tests (которые не понимают `--quick`).
        # Перечисляем все benches явно: message_generation + sender_throughput.
        continue-on-error: true
        run: cargo bench --locked --bench message_generation --bench sender_throughput -- --quick 2>&1 | tee bench-output.txt

      - name: Upload bench output (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-output-${{ matrix.os }}
          path: bench-output.txt
          if-no-files-found: ignore

      - name: Validate examples against JSON Schema (D3, v8.5.0)
        # D3: каждый профиль-пример в examples/ (json/yaml/yml) должен
        # проходить и F13-семантическую валидацию, и формальную JSON Schema
        # (--schema-strict). Это защищает от регрессий в схеме и в примерах.
        #
        # Исключаем schema_*.json — это schema-файлы для schema_file, а не
        # самостоятельные профили (они парсятся как Profile с пустым phases
        # и валидацию не проходят, что корректно — они не предназначены для
        # --validate).
        run: |
          set -e
          status=0
          for f in examples/*.json examples/*.yaml examples/*.yml; do
            [ -f "$f" ] || continue
            # Пропускаем schema-файлы (они НЕ являются валидными Profile —
            # не предназначены для --validate) и служебные .meta.json.
            # - schema_*.json: schema_auth, schema_http_access, schema_nginx
            # - *_schema.json: variable_payload_schema, protobuf_schema
            # - *.meta.json: UI metadata
            case "$(basename "$f")" in
              schema_*.json|proto*_schema.json|*_schema.json) continue ;;
              *.meta.json) continue ;;
              # Kafka-примеры требуют `--features kafka` — валидируются в
              # отдельном job `test-kafka` (см. ниже). PR-1: после введения
              # ValidationError::KafkaFeatureDisabled (для защиты от silent
              # fail при kafka target без фичи) без feature flag этот
              # пример будет валиться с осмысленной ошибкой, поэтому
              # пропускаем его здесь.
              kafka_*) continue ;;
            esac
            echo "checking $f"
            if ! cargo run --quiet --bin syslog-generator -- \
              --validate --schema-strict --profile "$f"; then
              echo "FAILED: $f"
              status=1
            fi
          done
          exit $status

  msrv:
    # v10.5.0: MSRV-check теперь **blocking** (не best-effort). С rust-toolchain.toml
    # (channel="1.95") job гарантированно запускается и падает при несовместимости.
    # Если rust-toolchain.toml НЕ существует — job завершается success без действий
    # (skip логика в первом step, не в `if:` — `hashFiles()` не работает на job level).
    #
    # Этот job гарантирует, что мы не поднимаем MSRV случайно (использование
    # фичи Rust, которая не работает в старых версиях). При попытке merge
    # PR, который поднимает MSRV, CI упадёт и merge заблокируется.
    name: MSRV check (blocking, v10.5.0)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check if rust-toolchain.toml exists
        id: check-toolchain
        # `hashFiles()` доступен только в step context, не на job level (`if:`).
        # Поэтому проверяем здесь. Если файла нет — skip остальные steps
        # через `if: steps.check-toolchain.outputs.has_toolchain == 'true'`.
        run: |
          if [ -f rust-toolchain.toml ]; then
            echo "has_toolchain=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_toolchain=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read MSRV from rust-toolchain.toml
        id: msrv
        if: steps.check-toolchain.outputs.has_toolchain == 'true'
        run: |
          channel=$(grep -E '^channel' rust-toolchain.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        if: steps.check-toolchain.outputs.has_toolchain == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.channel }}

      - name: Build with MSRV
        if: steps.check-toolchain.outputs.has_toolchain == 'true'
        run: cargo build --locked

      - name: Test with MSRV (smoke)
        if: steps.check-toolchain.outputs.has_toolchain == 'true'
        run: cargo test --locked --lib --bins

  # v10.5.0: cargo-deny — security advisories + license compliance.
  # Блокирует merge при:
  # - уязвимостях в зависимостях (RUSTSEC advisories)
  # - неизвестных registry/git источниках
  # - запрещённых лицензиях
  # - duplicate crate versions
  # Документация: https://github.com/embarkstudios/cargo-deny
  cargo-deny:
    name: cargo-deny (advisories + licenses, blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo-deny
      - name: Install cargo-deny
        # v10.4.3: cargo install вместо third-party action (taiki-e).
        # Аналогично fix в coverage job.
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny check
        # Проверяет advisories, bans, sources, licenses по deny.toml.
        run: cargo deny check

  # v10.5.0: cargo-machete — unused dependencies detection.
  # Блокирует merge при наличии unused deps в Cargo.toml (которые
  # увеличивают время компиляции и binary size без пользы).
  # Документация: https://github.com/bnjbvr/cargo-machete
  cargo-machete:
    name: cargo-machete (unused deps, blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo-machete
      - name: Install cargo-machete
        # v10.4.3: cargo install вместо third-party action.
        run: cargo install cargo-machete --locked
      - name: Run cargo-machete
        # cargo-machete по умолчанию проверяет все crates в workspace.
        # exit code 1 = найдены unused deps (блокирует merge).
        # exit code 0 = всё чисто.
        run: cargo machete

  # F16 (v9.3.0): отдельный job для проверки feature flag `kafka` —
  # гарантирует что Kafka/Redpanda транспорт через `rskafka` компилируется
  # и тесты проходят (включая F16 unit/integration тесты под cfg(feature="kafka")).
  # Базовый job `test` работает без feature (default), `test-kafka` —
  # с feature (--features kafka). Это покрывает оба режима сборки.
  test-kafka:
    name: Test kafka feature (ubuntu-latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo-kafka

      - name: Install OpenSSL dev headers (rskafka не использует, но libssl нужен для native-tls в CI build cache)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings, --features kafka)
        run: cargo clippy --all-targets --features kafka -- -D warnings

      - name: Build release (--features kafka)
        run: cargo build --release --locked --features kafka

      - name: Compile tests (--features kafka)
        run: cargo test --no-run --locked --features kafka

      - name: Run tests (--features kafka)
        run: cargo test --locked --features kafka,test-helpers

      - name: Compile benches (--features kafka)
        run: cargo bench --no-run --locked --features kafka

      - name: Validate ALL examples with kafka feature
        # PR-1: было только "Validate kafka example" с одним файлом. Это
        # пропускало регрессии в schema/profile при включённой kafka фиче
        # (не-kafka примеры могут сломаться, если изменится shared-код).
        # Теперь — полный цикл по ВСЕМ примерам, как в основном Test job,
        # но с --features kafka. Это даёт двойное покрытие:
        #  - основной Test job (без kafka): ловит регрессии в default build
        #  - test-kafka (с kafka): ловит регрессии в kafka-enabled build
        # Оба запускают cargo run --bin syslog-generator, поэтому дешёвые.
        run: |
          set -e
          status=0
          for f in examples/*.json examples/*.yaml examples/*.yml; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              schema_*.json|proto*_schema.json|*_schema.json) continue ;;
              *.meta.json) continue ;;
            esac
            echo "checking $f"
            if ! cargo run --quiet --bin syslog-generator --features kafka -- \
              --validate --schema-strict --profile "$f"; then
              echo "FAILED: $f"
              status=1
            fi
          done
          exit $status

  # v10.3.0 (Coverage ч.1): baseline coverage через cargo-llvm-cov.
  # **Non-blocking** — только отчёт и артефакт lcov.info. Blocking gate
  # (≥ 97% lines) запланирован в v10.4.0. Документация: docs/COVERAGE.md.
  coverage:
    name: Coverage baseline (cargo-llvm-cov, non-blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo-cov

      - name: Install cargo-llvm-cov
        # v10.4.3: `cargo install cargo-llvm-cov --locked` вместо
        # `taiki-e/install-action@v2` — убирает dependabot-баг
        # "install-action: no tool specified" (warning на каждом run).
        # Использует официальный cargo registry вместо third-party action.
        # ~30 секунд на холодную установку (кэшируется через Swatinem cache).
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage
        # v10.3.0: baseline. v10.4.0: blocking gate с проверкой ≥ 97%.
        # LCOV-формат для возможной интеграции с codecov.io в будущем.
        run: |
          cargo llvm-cov \
            --features kafka \
            --workspace \
            --lcov --output-path lcov.info \
            --summary-only 2>&1 | tee coverage-summary.txt

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-baseline
          path: |
            lcov.info
            coverage-summary.txt
          if-no-files-found: warn

  # v10.7.4 (PR-3): public-api snapshot — фиксирует публичный API крейта.
  # При PR если diff показывает breaking changes — job падает (после
  # записи baseline). Это страховка от случайного экспорта приватных
  # типов или удаления публичных.
  #
  # Использует cargo-public-api (https://github.com/Enselis/cargo-public-api).
  # Snapshot хранится в `api-snapshot.txt` в корне репозитория.
  # Требует nightly toolchain для rustdoc-json.
  public-api:
    name: cargo public-api snapshot (blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly toolchain (required for rustdoc-json)
        uses: dtolnay/rust-toolchain@nightly
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ runner.os }}-cargo-public-api
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: Run public-api diff
        # Если файл api-snapshot.txt существует — diff с ним.
        # Если нет (первый запуск) — exit 0 (baseline генерируется локально).
        run: |
          cargo public-api --features test-helpers 2>/dev/null > /tmp/current-api.txt
          if [ -f api-snapshot.txt ]; then
            diff -u api-snapshot.txt /tmp/current-api.txt
          else
            echo "::warning::api-snapshot.txt not found, skipping diff"
            echo "::warning::Generate baseline locally: cargo public-api --features test-helpers > api-snapshot.txt"
          fi
