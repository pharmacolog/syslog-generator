# N12 (v9.6.0): syslog-ng.conf для docker-compose демо.
#
# Минимальная конфигурация:
# - UDP 514 (RFC 5424/3164 syslog)
# - TCP 601 (RFC 6587 framing — non-transparent LF; см. profile-docker.yaml)
# - Шаблон $ISODATE + $PROGRAM + $MSG
# - Логи пишутся в /var/log/syslog-ng/messages.log (volume)

@version: 4.7
@include "scl.conf"

# === Source: UDP (RFC 5424/3164 syslog, plain octet-stream) ===
source s_udp {
    network(
        transport("udp")
        port(514)
    );
};

# === Source: TCP с RFC 6587 framing (octet-stream + LF trailer) ===
# flags(no-parse) отключает встроенный syslog-парсер — нам нужен
# прозрачный pipe до destination, без переинтерпретации.
# См. RFC 6587 §3.4.2 (non-transparent framing).
source s_tcp {
    network(
        transport("tcp")
        port(601)
        flags(no-parse)
    );
};

# === Destination: один файл со всеми сообщениями ===
destination d_file {
    file(
        "/var/log/syslog-ng/messages.log"
        create-dirs(yes)
        dir-perm(0755)
        perm(0644)
    );
};

# === Log path: всё → один файл ===
log {
    source(s_udp);
    source(s_tcp);
    destination(d_file);
};