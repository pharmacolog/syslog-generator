# PR-17d (v10.7.19): PGO (Profile-Guided Optimization) build для release tags.
#
# Только для `v*.*.*` tags (release builds). PR-овые CI runs используют
# обычный release profile без PGO (для скорости CI).
#
# Улучшение: ~5% throughput на hot-path bench (1.74 µs → 1.65 µs/msg).
# Полная процедура — см. docs/PERFORMANCE.md §6.

name: Release PGO build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag для PGO-сборки (например, v10.7.20)'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  pgo-build:
    name: PGO build (Linux amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pgo-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (with llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-pgo
          cache-on-failure: true

      - name: PGO step 1/3 — build with profile-generate
        env:
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          mkdir -p "$PGO_DIR"
          # -Cprofile-generate= записывает .profraw файлы в $PGO_DIR при запуске бинаря.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            cargo build --release --bench hot_path

      - name: PGO step 2/3 — run representative workload (bench)
        env:
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Прогон benches для сбора representative profile данных.
          # Criterion binary сам по себе нагружает hot-path достаточно для профиля.
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            ./target/release/deps/hot_path-* --bench --quick

      - name: PGO step 3/3 — merge profdata + final build
        env:
          PGO_DIR: ${{ github.workspace }}/pgo
        run: |
          # Merge .profraw → merged.profdata
          echo "::group::Merging $(ls "$PGO_DIR"/*.profraw 2>/dev/null | wc -l | tr -d ' ') profraw files"
          ls "$PGO_DIR"/*.profraw 2>/dev/null | head -5
          llvm-profdata merge -o "$PGO_DIR/merged.profdata" "$PGO_DIR"/*.profraw
          ls -la "$PGO_DIR/merged.profdata"
          echo "::endgroup::"

          # Final build with profile-use
          echo "::group::Building optimized binary with merged.profdata"
          RUSTFLAGS="-Cprofile-use=$PGO_DIR/merged.profdata" \
            cargo build --release
          echo "::endgroup::"

      - name: Verify PGO improvement (sanity bench)
        run: |
          echo "::group::PGO verification — bench should show ~1.65 µs/msg (vs ~1.74 без PGO)"
          ./target/release/deps/hot_path-* --bench --quick 2>&1 \
            | grep -E "rfc5424_with_faker|thrpt" \
            | head -5
          echo "::endgroup::"

      - name: Upload PGO-optimized binary
        uses: actions/upload-artifact@v7
        with:
          name: syslog-generator-pgo-${{ github.ref_name }}
          path: |
            target/release/syslog-generator
            pgo/merged.profdata
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## PGO build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Profile files: $(ls ${{ github.workspace }}/pgo/*.profraw 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Merged profdata: $(ls -la ${{ github.workspace }}/pgo/merged.profdata 2>/dev/null | awk '{print $5}') bytes" >> $GITHUB_STEP_SUMMARY
          echo "- See docs/PERFORMANCE.md §6 for details" >> $GITHUB_STEP_SUMMARY