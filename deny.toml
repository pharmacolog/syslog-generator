# v10.5.0: cargo-deny configuration.
#
# Проверяет:
# - advisories: уязвимости в зависимостях (RUSTSEC advisory database)
# - bans: запрещённые crates (например, outdated/unsafe)
# - sources: только trusted registries (crates.io)
# - licenses: только разрешённые лицензии (MIT/Apache-2.0/BSD)
#
# Запуск: cargo deny check (локально), `embarkstudios/cargo-deny` action (в CI).
# Документация: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
# PR-12: RUSTSEC-2025-0119 (number_prefix / indicatif) — transitive от indicatif.
# indicatif — наш выбор для progress bar (PR-3). Прямого dependency у нас нет,
# ignore остаётся до обновления indicatif или перехода на zeroize-only progress bar.
# Reason: indicatif pulls number_prefix transitively; not user-input reachable.
ignore = [
    { id = "RUSTSEC-2025-0119", reason = "Transitive through indicatif; not user-input reachable; expires: 2027-01-23; review Issue #90." },
]
# PR-12: yanked = "deny" — yanks signal upstream compromise / CVE disclosure.
# Блокирующий gate через cargo-deny в CI.
yanked = "deny"

[bans]
# PR-12: multiple-versions = "warn" — дубликаты часто unavoidable в Rust ecosystem
# (getrandom, hashbrown, thiserror часто приходят в разных версиях из разных deps).
# Hard deny создаёт false positives без security value. Используем warn — мониторинг
# через CI logs. Если появятся реальные duplicates с CVE, отдельный PR.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[licenses]
allow = [
    "MIT",
    "MIT-0",                   # v10.7.1: borrow-or-share (через jsonschema 0.47 transitive)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",                 # ring использует MPL-2.0 (нормально для крипто)
    "CDLA-Permissive-2.0",    # webpki-roots v0.26/v1.0 (Mozilla CA bundle)
]
confidence-threshold = 0.8

